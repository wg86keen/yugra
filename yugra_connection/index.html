<!DOCTYPE html><html lang="ru"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>YUGRA online</title>
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg:         #000000;
            --surface:    rgba(255,255,255,.055);
            --surface-2:  rgba(255,255,255,.08);
            --border:     rgba(255,255,255,.09);
            --text:       #ffffff;
            --text-2:     rgba(235,235,245,.62);
            --text-3:     rgba(235,235,245,.32);
            --blue:       #0a84ff;
            --blue-glow:  rgba(10,132,255,.25);
            --teal:       #32ade6;
            --teal-glow:  rgba(50,173,230,.22);
            --green:      #30d158;
            --green-glow: rgba(48,209,88,.2);
        }
        html, body { height: 100%; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif;
            background: var(--bg);  /* абсолютно чёрный фон */
            color: var(--text);
            min-height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px 20px max(24px, env(safe-area-inset-bottom));
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }
        /* Никаких дополнительных градиентов или наложений */
        .wrap {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            gap: 0;
        }
        /* ── Header ── */
        .header {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-bottom: 40px;
            animation: fadeUp .55s cubic-bezier(.22,1,.36,1) both;
        }
        .icon-wrap {
            position: relative;
            margin-bottom: 22px;
        }
        .icon-wrap::after {
            content: '';
            position: absolute;
            inset: -16px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(10,132,255,.28) 0%, transparent 70%);
            z-index: -1;
            animation: glow-pulse 3s ease-in-out infinite;
        }
        @keyframes glow-pulse {
            0%,100% { opacity: .7; transform: scale(1);    }
            50%      { opacity: 1;  transform: scale(1.08); }
        }
        .app-icon {
            width: 92px; height: 92px;
            border-radius: 21%;
            background: linear-gradient(145deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow:
                0 0 0 .5px rgba(255,255,255,.12),
                0 2px 4px rgba(0,0,0,.4),
                0 12px 40px rgba(0,0,0,.6),
                0 0 60px rgba(10,132,255,.2);
            overflow: hidden;
        }
        .app-icon img {
            width: 92px;
            height: 92px;
            object-fit: contain;
            filter: drop-shadow(0 1px 2px rgba(0,0,0,0.2));
        }
        .title {
            font-size: 1.875rem;
            font-weight: 700;
            letter-spacing: -.6px;
            margin-bottom: 10px;
            text-align: center;
        }
        .subtitle {
            font-size: .9375rem;
            color: var(--text-2);
            text-align: center;
            line-height: 1.5;
            max-width: 295px;
        }
        .status-pill {
            display: inline-flex;
            align-items: center;
            gap: 7px;
            margin-top: 16px;
            padding: 5px 14px;
            background: rgba(48,209,88,.1);
            border: .5px solid rgba(48,209,88,.28);
            border-radius: 99px;
            font-size: .8125rem;
            color: var(--green);
            font-weight: 500;
        }
        .pill-dot {
            width: 6px; height: 6px;
            border-radius: 50%;
            background: var(--green);
            box-shadow: 0 0 8px var(--green-glow);
            animation: blink 2.2s ease-in-out infinite;
        }
        @keyframes blink {
            0%,100% { opacity: 1;   }
            50%      { opacity: .4;  }
        }
        /* ── Section label ── */
        .section-label {
            font-size: .78rem;
            font-weight: 500;
            color: var(--text-3);
            text-transform: uppercase;
            letter-spacing: .07em;
            padding: 0 4px 10px;
            animation: fadeUp .55s cubic-bezier(.22,1,.36,1) .12s both;
        }
        /* ── Cards ── */
        .cards {
            display: flex;
            flex-direction: column;
            gap: 10px;
            animation: fadeUp .55s cubic-bezier(.22,1,.36,1) .18s both;
        }
        .card {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 14px 16px;
            background: var(--surface);
            border: .5px solid var(--border);
            border-radius: 16px;
            text-decoration: none;
            color: var(--text);
            cursor: pointer;
            transition:
                background .18s ease,
                transform  .18s cubic-bezier(.22,1,.36,1),
                box-shadow .18s ease;
            -webkit-tap-highlight-color: transparent;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
        .card:hover {
            background: var(--surface-2);
            transform: translateY(-1px);
        }
        .card:active {
            transform: scale(.975);
            background: rgba(255,255,255,.04);
        }
        .card::before {
            content: '';
            position: absolute;
            left: 0; top: 20%; bottom: 20%;
            width: 3px;
            border-radius: 99px;
            opacity: 0;
            transition: opacity .2s;
        }
        .card { position: relative; overflow: hidden; }
        .card:hover::before { opacity: 1; }
        .card-site::before   { background: var(--blue); }
        .card-tg::before     { background: var(--teal); }
        .card-site:hover { box-shadow: 0 4px 24px rgba(10,132,255,.12); }
        .card-tg:hover   { box-shadow: 0 4px 24px rgba(50,173,230,.1); }
        .card-icon {
            width: 44px; height: 44px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .icon-site {
            background: linear-gradient(135deg, #0a84ff 0%, #0066cc 100%);
            box-shadow: 0 4px 16px rgba(10,132,255,.35);
        }
        .icon-tg {
            background: linear-gradient(135deg, #32ade6 0%, #2196c9 100%);
            box-shadow: 0 4px 16px rgba(50,173,230,.3);
        }
        .card-icon svg {
            width: 24px;
            height: 24px;
            display: block;
        }
        .card-body { flex: 1; min-width: 0; }
        .card-title {
            font-size: 1rem;
            font-weight: 600;
            line-height: 1.2;
        }
        .card-sub {
            font-size: .8125rem;
            color: var(--text-2);
            margin-top: 3px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .card-arrow {
            color: var(--text-3);
            flex-shrink: 0;
        }
        .card-arrow svg {
            width: 16px; height: 16px;
            transition: transform .18s cubic-bezier(.22,1,.36,1);
        }
        .card:hover .card-arrow svg { transform: translateX(2px); }
        /* ── Footer ── */
        .footer {
            padding-top: 36px;
            text-align: center;
            font-size: .78rem;
            color: var(--text-3);
            animation: fadeUp .5s cubic-bezier(.22,1,.36,1) .34s both;
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(18px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        @media (max-width: 360px) {
            .title { font-size: 1.6rem; }
            .app-icon { width: 80px; height: 80px; }
        }
    </style>
</head>
<body>

<div class="wrap">

    <!-- Header -->
    <div class="header">
        <div class="icon-wrap">
            <div class="app-icon">
                <!-- Замените logo.png на путь к вашему логотипу -->
                <img src="logo.png" alt="YUGRA logo">
            </div>
        </div>
        <div class="title">Добро пожаловать!</div>
        <div class="subtitle">Чтобы управлять доступом и продлевать подписку, выберите платформу, на которой вы регистрировались</div>
        <div class="status-pill">
            <span class="pill-dot"></span>
            Сервис работает 
        </div>
    </div>

    <!-- Login options -->
    <div class="section-label">Войти через</div>
    <div class="cards">

        <a href="https://yugra.run" class="card card-site">
            <div class="card-icon icon-site">
                <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10"/>
                    <line x1="2" y1="12" x2="22" y2="12"/>
                    <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
                </svg>
            </div>
            <div class="card-body">
                <div class="card-title">Личный кабинет</div>
                <div class="card-sub">Сайт · yugra.run</div>
            </div>
            <span class="card-arrow">
                <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M6 3l5 5-5 5"></path>
                </svg>
            </span>
        </a>

        <a href="https://t.me/Yugra86V_bot" class="card card-tg">
            <div class="card-icon icon-tg">
                <!-- Настоящая иконка Telegram (бумажный самолётик) -->
                <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21.5 4.5L2 12.5l6.5 2.5L11 21l2.5-6.5L21.5 4.5z"/>
                    <path d="M15.5 9.5L9 15"/>
                </svg>
            </div>
            <div class="card-body">
                <div class="card-title">Telegram-бот</div>
                <div class="card-sub">@Yugra86V_bot</div>
            </div>
            <span class="card-arrow">
                <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M6 3l5 5-5 5"></path>
                </svg>
            </span>
        </a>

    </div>

    <!-- Изменённый футер: только копирайт без домена -->
    <div class="footer">
        © 🛡️YUGRA online
    </div>

</div>

</body></html>
